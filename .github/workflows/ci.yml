name: ci

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # locked = the exact declared environment for deterministic replay;
        # no current Route-A paper numbers exist before the one-time opening.
        # floors = forward-compatibility check against the loose minimums.
        deps: [locked, floors]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      # Immutable upstream revisions: checkout v4.3.0, setup-python v5.6.0.
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          if [ "${{ matrix.deps }}" = "locked" ]; then
            python -m pip install --require-hashes -r requirements-lock-py312-hashed.txt
          else
            python -m pip install -r requirements.txt
            # Floors exercises loose runtime minima, but the declared build
            # backend remains exact even when build isolation is disabled.
            python -m pip install --no-deps setuptools==81.0.0
          fi
          python -c "from importlib.metadata import version; assert version('setuptools') == '81.0.0', version('setuptools')"
          # Do not let editable installation resolve or fetch a second dependency
          # graph after the locked environment has been installed.
          python -m pip install --no-build-isolation --no-deps -e .
      - name: Import smoke test
        run: |
          python -c "from thermoroute import config, data, features, datasets, baselines, air2stream, thermoroute, train, conformal, metrics, results, significance, decision, usgs; print('imports OK')"
      - name: Lint and type contracts
        if: ${{ matrix.deps == 'locked' }}
        run: |
          ruff check src tests
          ruff check --select F scripts
          mypy src/thermoroute --ignore-missing-imports
      - name: Unit tests (leakage + metrics + sample consistency)
        env:
          PYTHONPATH: src
        run: |
          # tests/test_sample_consistency is skipped when no usgs_predictions
          # file is shipped — that's intentional for CI on a clean checkout.
          pytest tests/ -q
      - name: Reproducibility, checkpoint, prediction-schema, and release contracts
        if: ${{ matrix.deps == 'locked' }}
        env:
          PYTHONPATH: src
        run: |
          pytest \
            tests/test_repro.py \
            tests/test_checkpoint.py \
            tests/test_prediction_schema.py \
            tests/test_manifest_release.py -q
      - name: Provenance manifest round trip (clean Git revision)
        if: ${{ matrix.deps == 'locked' }}
        run: |
          python scripts/14_manifest.py \
            --root "$PWD" --manifest /tmp/thermoroute-manifest.json
          python scripts/14_manifest.py \
            --root "$PWD" --manifest /tmp/thermoroute-manifest.json \
            --check --strict-git
      - name: Build and import the wheel outside the source tree
        if: ${{ matrix.deps == 'locked' }}
        run: |
          python -m pip wheel . --no-deps --wheel-dir /tmp/thermoroute-wheels
          python -m venv --system-site-packages /tmp/thermoroute-wheel-venv
          /tmp/thermoroute-wheel-venv/bin/pip install --no-deps \
            /tmp/thermoroute-wheels/thermoroute-*.whl
          (cd /tmp && /tmp/thermoroute-wheel-venv/bin/python -c \
            "import thermoroute; from thermoroute import results; print(results.PREDICTION_SCHEMA_VERSION)")
      - name: Data acquisition import (no network call)
        env:
          PYTHONPATH: src
        run: |
          python -c "from thermoroute.usgs import build_station, fetch_nwis_daily, fetch_daymet, fetch_gridmet_wind; print('usgs module OK')"
      - name: Smoke experiment (3-station, 1 seed, asserts on numbers)
        if: ${{ matrix.deps == 'locked' }}
        env:
          PYTHONPATH: src
        run: |
          # A tiny end-to-end run that trains ThermoRoute for a few epochs on the
          # shipped 3-station data and asserts the pipeline produces sane numbers:
          # persistence-beating skill sign is NOT required on the near-deterministic
          # legacy three-monitoring-site series, but conformal coverage must be in a
          # sane band and the
          # identical-keys invariant must hold. Guards against silent pipeline rot.
          python scripts/ci_smoke.py
      - name: Build and verify clean-room release
        if: ${{ matrix.deps == 'locked' }}
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          bash scripts/make_release_archive.sh
          python scripts/verify_release.py dist/thermoroute_release_v*.zip \
            --run-data-smoke
