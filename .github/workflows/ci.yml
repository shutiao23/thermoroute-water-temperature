name: ci

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # locked = the exact environment that produced the paper's numbers;
        # floors = forward-compatibility check against the loose minimums.
        deps: [locked, floors]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          if [ "${{ matrix.deps }}" = "locked" ]; then
            grep -v pypandoc requirements-lock.txt > /tmp/req-locked.txt
            pip install -r /tmp/req-locked.txt
          else
            pip install -r requirements.txt
          fi
          # belt-and-braces: install also as editable so src.thermoroute is on path
          pip install -e .
      - name: Import smoke test
        env:
          KMP_DUPLICATE_LIB_OK: "TRUE"
        run: |
          python -c "from thermoroute import config, data, features, datasets, baselines, air2stream, thermoroute, train, conformal, metrics, results, significance, decision, usgs; print('imports OK')"
      - name: Unit tests (leakage + metrics + sample consistency)
        env:
          PYTHONPATH: src
          KMP_DUPLICATE_LIB_OK: "TRUE"
        run: |
          # tests/test_sample_consistency is skipped when no usgs_predictions
          # file is shipped — that's intentional for CI on a clean checkout.
          pytest tests/ -q
      - name: Data acquisition import (no network call)
        env:
          PYTHONPATH: src
        run: |
          python -c "from thermoroute.usgs import build_station, fetch_nwis_daily, fetch_daymet, fetch_gridmet_wind; print('usgs module OK')"
